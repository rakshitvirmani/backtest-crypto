version: '3.8'

services:
  fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_fetcher
    environment:
      DB_PATH: /app/data/trading.duckdb
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    command: python fetch_to_db.py

  backtester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_backtester
    environment:
      DB_PATH: /app/data/trading.duckdb
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    command: python backtester.py --symbol BTCUSDT --timeframe 4h --strategy supertrend
    profiles:
      - backtest

  optimizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_optimizer
    environment:
      DB_PATH: /app/data/trading.duckdb
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    command: python optimizer.py --symbol BTCUSDT --timeframe 4h
    profiles:
      - optimize
